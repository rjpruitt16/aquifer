app = "aquifer"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  DB_PATH = "/data/aquifer.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[mounts]]
  source = "aquifer_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
